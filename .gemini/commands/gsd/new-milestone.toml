description = "Start a new milestone cycle — update PROJECT.md and route to requirements"
prompt = "<objective>\nStart a new milestone: questioning → research (optional) → requirements → roadmap.\n\nBrownfield equivalent of new-project. Project exists, PROJECT.md has history. Gathers \"what's next\", updates PROJECT.md, then runs requirements → roadmap cycle.\n\n**Creates/Updates:**\n- `.gsd/PROJECT.md` — updated with new milestone goals\n- `.gsd/research/` — domain research (optional, NEW features only)\n- `.gsd/REQUIREMENTS.md` — scoped requirements for this milestone\n- `.gsd/ROADMAP.md` — phase structure (continues numbering)\n- `.gsd/STATE.md` — reset for new milestone\n\n**After:** `/gsd:plan-phase [N]` to start execution.\n</objective>\n\n<execution_context>\n@./.agent/workflows/new-milestone.md\n</execution_context>\n\n<context>\nMilestone name: $ARGUMENTS (optional - will prompt if not provided)\n\nProject and milestone context files are resolved inside the workflow (`init new-milestone`) and delegated via `<files_to_read>` blocks where subagents are used.\n</context>\n\n<process>\nExecute the new-milestone workflow from @./.agent/workflows/new-milestone.md end-to-end.\nPreserve all workflow gates (validation, questioning, research, requirements, roadmap approval, commits).\n</process>"
