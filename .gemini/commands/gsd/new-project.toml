description = "Initialize a new project with deep context gathering and PROJECT.md"
prompt = "<context>\n**Flags:**\n- `--auto` — Automatic mode. After config questions, runs research → requirements → roadmap without further interaction. Expects idea document via @ reference.\n</context>\n\n<objective>\nInitialize a new project through unified flow: questioning → research (optional) → requirements → roadmap.\n\n**Creates:**\n- `.gsd/PROJECT.md` — project context\n- `.gsd/config.json` — workflow preferences\n- `.gsd/research/` — domain research (optional)\n- `.gsd/REQUIREMENTS.md` — scoped requirements\n- `.gsd/ROADMAP.md` — phase structure\n- `.gsd/STATE.md` — project memory\n\n**After this command:** Run `/gsd:plan-phase 1` to start execution.\n</objective>\n\n<execution_context>\n@./.agent/workflows/new-project.md\n</execution_context>\n\n<process>\nExecute the new-project workflow from @./.agent/workflows/new-project.md end-to-end.\nPreserve all workflow gates (validation, approvals, commits, routing).\n</process>"
