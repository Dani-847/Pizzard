description = 'Research how to implement a phase (standalone - usually use /gsd:plan-phase instead)'
prompt = '<objective>\nConduct technical research to inform planning decisions for a phase.\n</objective>\n\n<execution_context>\n@./.agent/workflows/research-phase.md\n</execution_context>\n\n<context>\nPhase: $ARGUMENTS (required — phase number, optionally with --level 1|2|3)\n\nRequired files:\n- .gsd/ROADMAP.md — Phase definition\n- .gsd/ARCHITECTURE.md — Current architecture\n- .gsd/STACK.md — Current tech stack\n</context>\n\n<process>\nExecute the research-phase workflow from @./.agent/workflows/research-phase.md end-to-end.\nPreserve all steps (phase context load, question identification, research, RESEARCH.md generation, commit, next steps).\n</process>'
